<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="theme-color" content="#ff9800">
    <title>Daily Streak - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #121212;
            font-family: 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-container {
            text-align: center;
            padding: 40px 20px;
            max-width: 400px;
            margin: 0 auto;
        }
        .logo { font-size: 5rem; margin-bottom: 20px; }
        h1 { color: #ff9800; margin-bottom: 10px; }
        p { color: #aaa; margin-bottom: 30px; }
        .btn-google {
            background: #4285f4;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 40px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            max-width: 280px;
            transition: transform 0.1s;
        }
        .btn-google:active { transform: scale(0.97); }
        .btn-google:disabled { opacity: 0.6; transform: none; }
        .login-message { margin-top: 20px; color: #f44336; font-size: 0.9rem; }
        .loading { display: inline-block; width: 20px; height: 20px; border: 2px solid #fff; border-radius: 50%; border-top-color: transparent; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">🔥</div>
        <h1>Daily Streak</h1>
        <p>Mantenha sua sequência diária!</p>
        <button id="btnLogin" class="btn-google">🚀 Entrar com Google</button>
        <div id="loginMessage" class="login-message"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, onAuthStateChanged, signInWithRedirect, getRedirectResult } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCN-U4_DmOIpdZxLpsZMejYfAWjvTVZPBo",
            authDomain: "daily-streak-app.firebaseapp.com",
            databaseURL: "https://daily-streak-app-default-rtdb.firebaseio.com",
            projectId: "daily-streak-app",
            storageBucket: "daily-streak-app.firebasestorage.app",
            messagingSenderId: "398776168775",
            appId: "1:398776168775:web:b8fb249259685adc2b9c62"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        const database = getDatabase(app);

        const btnLogin = document.getElementById('btnLogin');
        const loginMessage = document.getElementById('loginMessage');

        function showMessage(msg, isError = true) {
            loginMessage.textContent = msg;
            loginMessage.style.color = isError ? '#f44336' : '#4caf50';
            setTimeout(() => {
                if (loginMessage.textContent === msg) loginMessage.textContent = '';
            }, 5000);
        }

        // 🔥 SÓ USA REDIRECT (FUNCIONA EM CELULAR E PC)
        async function handleLogin() {
            btnLogin.disabled = true;
            btnLogin.innerHTML = '<span class="loading"></span> Carregando...';
            
            try {
                // Limpa sessão anterior se existir
                if (auth.currentUser) {
                    await auth.signOut();
                }
                await signInWithRedirect(auth, provider);
            } catch (error) {
                console.error('Erro:', error);
                showMessage(`❌ Erro: ${error.message}`);
                btnLogin.disabled = false;
                btnLogin.innerHTML = '🚀 Entrar com Google';
            }
        }

        // 🔥 PROCESSA O RESULTADO DO REDIRECT
        async function handleRedirectResult() {
            try {
                const result = await getRedirectResult(auth);
                if (result) {
                    const user = result.user;
                    console.log('Login bem-sucedido:', user.displayName);
                    
                    // Verifica se usuário existe no banco
                    const userRef = ref(database, `users/${user.uid}`);
                    const snapshot = await get(userRef);
                    if (!snapshot.exists()) {
                        await set(userRef, {
                            streak: 0,
                            bestStreak: 0,
                            points: 0,
                            achievements: {},
                            lastCheckin: null
                        });
                        
                        // Cria entrada no ranking
                        const rankRef = ref(database, `ranking/${user.uid}`);
                        await set(rankRef, {
                            name: user.displayName || user.email,
                            points: 0,
                            photoURL: user.photoURL || '',
                            lastActive: Date.now()
                        });
                    }
                    
                    // Redireciona para o app
                    window.location.replace('app.html');
                }
            } catch (error) {
                console.error('Erro no redirect:', error);
                showMessage(`❌ Erro ao completar login: ${error.message}`);
                btnLogin.disabled = false;
                btnLogin.innerHTML = '🚀 Entrar com Google';
            }
        }

        // 🔥 VERIFICA SE JÁ ESTÁ LOGADO
        onAuthStateChanged(auth, (user) => {
            if (user) {
                console.log('Usuário já logado:', user.displayName);
                window.location.replace('app.html');
            }
        });

        // 🔥 INICIALIZA
        btnLogin.onclick = handleLogin;
        handleRedirectResult();
    </script>
</body>
</html>
