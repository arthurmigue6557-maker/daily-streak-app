<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="theme-color" content="#ff9800">
    <title>Daily Streak - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #121212;
            font-family: 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-container {
            text-align: center;
            padding: 40px 20px;
            max-width: 400px;
            margin: 0 auto;
        }
        .logo { font-size: 5rem; margin-bottom: 20px; }
        h1 { color: #ff9800; margin-bottom: 10px; }
        p { color: #aaa; margin-bottom: 30px; }
        .btn-google {
            background: #4285f4;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 40px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            max-width: 280px;
            transition: transform 0.1s;
        }
        .btn-google:active { transform: scale(0.97); }
        .btn-google:disabled { opacity: 0.6; transform: none; }
        .login-message { margin-top: 20px; color: #f44336; font-size: 0.9rem; }
        .loading { display: inline-block; width: 20px; height: 20px; border: 2px solid #fff; border-radius: 50%; border-top-color: transparent; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">🔥</div>
        <h1>Daily Streak</h1>
        <p>Mantenha sua sequência diária!</p>
        <button id="btnLogin" class="btn-google">
            🚀 Entrar com Google
        </button>
        <div id="loginMessage" class="login-message"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signInWithRedirect, getRedirectResult } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCN-U4_DmOIpdZxLpsZMejYfAWjvTVZPBo",
            authDomain: "daily-streak-app.firebaseapp.com",
            databaseURL: "https://daily-streak-app-default-rtdb.firebaseio.com",
            projectId: "daily-streak-app",
            storageBucket: "daily-streak-app.firebasestorage.app",
            messagingSenderId: "398776168775",
            appId: "1:398776168775:web:b8fb249259685adc2b9c62"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        const database = getDatabase(app);

        const btnLogin = document.getElementById('btnLogin');
        const loginMessage = document.getElementById('loginMessage');

        let isProcessing = false;

        function showMessage(msg, isError = true) {
            loginMessage.textContent = msg;
            loginMessage.style.color = isError ? '#f44336' : '#4caf50';
            setTimeout(() => {
                if (loginMessage.textContent === msg) loginMessage.textContent = '';
            }, 5000);
        }

        function isMobile() {
            return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        }

        // 🔥 LIMPAR SESSÕES ANTERIORES (se tiver corrompida)
        async function clearOldSession() {
            try {
                const currentUser = auth.currentUser;
                if (currentUser) {
                    await auth.signOut();
                    console.log('Sessão antiga limpa');
                }
            } catch(e) { console.log('Erro ao limpar sessão:', e); }
        }

        // 🔥 FUNÇÃO PRINCIPAL DE LOGIN
        async function handleLogin() {
            if (isProcessing) {
                showMessage('Aguarde, processando...');
                return;
            }
            
            isProcessing = true;
            btnLogin.disabled = true;
            btnLogin.innerHTML = '<span class="loading"></span> Carregando...';
            
            try {
                await clearOldSession();
                
                if (isMobile()) {
                    // MOBILE: usa redirect (SEM POPUP)
                    console.log('Mobile detectado - usando redirect');
                    await signInWithRedirect(auth, provider);
                    // O código PARA aqui e redireciona para o Google
                    return;
                } else {
                    // DESKTOP: usa popup
                    console.log('Desktop detectado - usando popup');
                    const result = await signInWithPopup(auth, provider);
                    const user = result.user;
                    console.log('Login bem-sucedido:', user.displayName);
                    window.location.href = 'app.html';
                }
            } catch (error) {
                console.error('Erro detalhado:', error);
                
                if (error.code === 'auth/popup-blocked') {
                    showMessage('⚠️ Popup bloqueado! Clique novamente.');
                    isProcessing = false;
                    btnLogin.disabled = false;
                    btnLogin.innerHTML = '🚀 Entrar com Google';
                } else if (error.code === 'auth/network-request-failed') {
                    showMessage('⚠️ Sem internet! Verifique sua conexão.');
                    isProcessing = false;
                    btnLogin.disabled = false;
                    btnLogin.innerHTML = '🚀 Entrar com Google';
                } else if (error.code === 'auth/cancelled-popup-request') {
                    showMessage('⚠️ Login cancelado. Tente novamente.');
                    isProcessing = false;
                    btnLogin.disabled = false;
                    btnLogin.innerHTML = '🚀 Entrar com Google';
                } else {
                    showMessage(`❌ Erro: ${error.message}`);
                    isProcessing = false;
                    btnLogin.disabled = false;
                    btnLogin.innerHTML = '🚀 Entrar com Google';
                }
            }
        }

        // 🔥 RESULTADO DO REDIRECT (para mobile)
        async function handleRedirectResult() {
            try {
                const result = await getRedirectResult(auth);
                if (result) {
                    const user = result.user;
                    console.log('Redirect login bem-sucedido:', user.displayName);
                    
                    // Salvar usuário no banco se necessário
                    const userRef = ref(database, `users/${user.uid}`);
                    const snapshot = await get(userRef);
                    if (!snapshot.exists()) {
                        await set(userRef, {
                            streak: 0,
                            bestStreak: 0,
                            points: 0,
                            achievements: {},
                            lastCheckin: null
                        });
                    }
                    
                    window.location.href = 'app.html';
                }
            } catch (error) {
                console.error('Erro no redirect:', error);
                showMessage(`❌ Erro ao completar login: ${error.message}`);
                btnLogin.disabled = false;
                btnLogin.innerHTML = '🚀 Entrar com Google';
                isProcessing = false;
            }
        }

        // 🔥 VERIFICAR SESSÃO ATIVA
        onAuthStateChanged(auth, (user) => {
            if (user && window.location.pathname !== '/app.html') {
                console.log('Usuário já logado, redirecionando...');
                window.location.href = 'app.html';
            }
        });

        // 🔥 EXECUTAR
        btnLogin.onclick = handleLogin;
        handleRedirectResult();
    </script>
</body>
</html>
